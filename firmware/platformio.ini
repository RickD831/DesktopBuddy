; Desktop Buddy firmware — Waveshare ESP32-S3-Touch-LCD-3.49 (172x640, AXS15231B)
; Uses the pioarduino platform for arduino-esp32 core 3.x (required by the
; esp_lcd / i2c_master driver APIs this board's panel driver depends on).

[env:waveshare349]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino

; ESP32-S3R8: 16MB QIO flash (W25Q128), 8MB octal PSRAM
board_build.flash_mode = qio
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_opi

monitor_speed = 115200

build_flags =
    -DBOARD_HAS_PSRAM
    ; Serial = native USB CDC (the board's only USB port)
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; LVGL finds our lv_conf.h in include/
    -DLV_CONF_INCLUDE_SIMPLE
    -Iinclude
    -Isrc

lib_deps =
    lvgl/lvgl@9.3.0
    bblanchon/ArduinoJson@^7.2.0
    h2zero/NimBLE-Arduino@^2.2.1
